name: Build Firmware

on:
  push:
    branches: [main]
    paths:
      - 'keyboards/**'
      - 'via/**'
  pull_request:
    branches: [main]

  workflow_dispatch:
    inputs:
      keymap:
        description: 'Keymap to build'
        required: true
        default: 'via'
        type: choice
        options:
          - via
          - default
      dpad_mode:
        description: 'DPAD mode'
        required: true
        default: '0'
        type: choice
        options:
          - '0'
          - '1'
          - '2'
      create_release:
        description: 'Create a GitHub release with the hex files'
        required: false
        default: false
        type: boolean

jobs:
  # CI check on push/PR — verify both keymaps compile
  ci:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        keymap: [default, via]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install AVR toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-avr avr-libc

      - name: Install QMK CLI
        run: |
          python3 -m pip install --user qmk
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Setup QMK
        run: qmk setup -y -H ~/qmk_firmware

      - name: Symlink keyboard
        run: ln -s "$GITHUB_WORKSPACE/keyboards/open_do52" ~/qmk_firmware/keyboards/open_do52

      - name: Compile ${{ matrix.keymap }}
        run: cd ~/qmk_firmware && qmk compile -kb open_do52 -km ${{ matrix.keymap }}

  # Manual build — produces left and right hex files
  build:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install AVR toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-avr avr-libc

      - name: Install QMK CLI
        run: |
          python3 -m pip install --user qmk
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Setup QMK
        run: qmk setup -y -H ~/qmk_firmware

      - name: Symlink keyboard
        run: ln -s "$GITHUB_WORKSPACE/keyboards/open_do52" ~/qmk_firmware/keyboards/open_do52

      - name: Build left-hand firmware
        run: |
          cd ~/qmk_firmware
          EXTRA_ARGS=""
          if [ "${{ inputs.dpad_mode }}" != "0" ]; then
            EXTRA_ARGS="-e DPAD_MODE=${{ inputs.dpad_mode }}"
          fi
          qmk compile -kb open_do52 -km "${{ inputs.keymap }}" \
            -e INIT_EE_HANDS_LEFT=yes $EXTRA_ARGS

      - name: Rename left hex
        run: |
          KEYMAP="${{ inputs.keymap }}"
          DPAD="${{ inputs.dpad_mode }}"
          SUFFIX=""
          [ "$DPAD" != "0" ] && SUFFIX="_dpad${DPAD}"
          cp ~/qmk_firmware/open_do52_${KEYMAP}.hex \
             "$GITHUB_WORKSPACE/open_do52_${KEYMAP}${SUFFIX}_left.hex"

      - name: Build right-hand firmware
        run: |
          cd ~/qmk_firmware
          EXTRA_ARGS=""
          if [ "${{ inputs.dpad_mode }}" != "0" ]; then
            EXTRA_ARGS="-e DPAD_MODE=${{ inputs.dpad_mode }}"
          fi
          qmk compile -kb open_do52 -km "${{ inputs.keymap }}" \
            -e INIT_EE_HANDS_RIGHT=yes $EXTRA_ARGS

      - name: Rename right hex
        run: |
          KEYMAP="${{ inputs.keymap }}"
          DPAD="${{ inputs.dpad_mode }}"
          SUFFIX=""
          [ "$DPAD" != "0" ] && SUFFIX="_dpad${DPAD}"
          cp ~/qmk_firmware/open_do52_${KEYMAP}.hex \
             "$GITHUB_WORKSPACE/open_do52_${KEYMAP}${SUFFIX}_right.hex"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: "*.hex"

  # Create GitHub release when requested
  release:
    needs: build
    if: inputs.create_release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: release/

      - name: Generate release tag
        id: tag
        run: |
          TAG="v$(date -u +%Y%m%d-%H%M%S)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Firmware ${{ steps.tag.outputs.tag }}"
          body: |
            **Build parameters:**
            - Keymap: `${{ inputs.keymap }}`
            - DPAD mode: `${{ inputs.dpad_mode }}`

            **Two hex files — one per side:**
            - `*_left.hex` — flash to the **left** half
            - `*_right.hex` — flash to the **right** half

            Open QMK Toolbox, select the correct hex for each side, put the
            Pro Micro into bootloader mode (short RESET to GND), and flash.
            The firmware writes its left/right identity to EEPROM on first boot.
            After that, future updates can use the same hex for both sides.
          files: release/*
